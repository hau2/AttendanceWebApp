<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - Company Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4848e5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md flex flex-col items-center">
<div class="mb-8 text-center flex flex-col items-center">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-4 text-white shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-3xl">domain</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100 mb-2">Attendance SaaS</h1>
<p class="text-slate-500 dark:text-slate-400">Company registration for new owners.</p>
</div>
<div class="w-full bg-white dark:bg-slate-800 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none p-8 border border-slate-100 dark:border-slate-700">
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100 mb-6 text-center">Create your company account</h2>
<form class="space-y-5">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Company Name</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-primary focus:ring-primary focus:ring-1 h-11 px-4 text-sm transition-colors" placeholder="Enter your company name" required="" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Full Name</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-primary focus:ring-primary focus:ring-1 h-11 px-4 text-sm transition-colors" placeholder="Enter your full name" required="" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Email</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-primary focus:ring-primary focus:ring-1 h-11 px-4 text-sm transition-colors" placeholder="Enter your email address" required="" type="email"/>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Password</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:border-primary focus:ring-primary focus:ring-1 h-11 px-4 text-sm transition-colors" placeholder="Create a password" required="" type="password"/>
<p class="mt-1.5 text-xs text-slate-500 dark:text-slate-400">Must be at least 8 characters.</p>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-medium h-11 rounded-lg transition-colors flex items-center justify-center" type="button">
                        Create Account
                    </button>
</div>
</form>
</div>
<p class="mt-6 text-sm text-slate-600 dark:text-slate-400 text-center">
            Already have an account? <a class="font-medium text-primary hover:text-primary/80 transition-colors" href="#">Sign in</a>
</p>
</div>
</body></html>
